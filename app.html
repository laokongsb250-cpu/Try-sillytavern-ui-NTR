<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; overflow: hidden; }
        
        /* --- 主要问题修复 --- */
        /* 将 height: 100% 修改为 height: 100vh，让容器高度直接等于视窗高度 */
        .phone { 
            width: 100%; 
            max-width: 100%; 
            margin: 0 auto; 
            background: #0f0f0f; 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            min-height: 400px; 
            height: 100vh; /* <-- 修改点 */
        }
        
        .content { overflow-y: auto; padding: 12px; flex: 1; min-height: 0; }
        .content::-webkit-scrollbar { width: 3px; }
        .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .profile-header { text-align: center; padding: 20px 0; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 12px; background: linear-gradient(135deg, #ff69b4, #bd00ff); display: grid; place-items: center; font-size: 48px; overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .profile-meta { font-size: 13px; color: #888; margin-bottom: 8px; }
        .profile-status { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; background: rgba(255,105,180,0.15); color: #ff69b4; border: 1px solid rgba(255,105,180,0.3); }
        .profile-status.locked { background: rgba(255,77,77,0.1); color: #ff4d4d; border-color: rgba(255,77,77,0.3); }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
        .card-title { font-size: 14px; font-weight: 700; color: #ff69b4; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        .meter-row { margin-bottom: 14px; }
        .meter-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .meter-label span:first-child { color: #aaa; }
        .meter-label span:last-child { color: #fff; font-weight: 600; }
        .meter-track { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
        .meter-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
        .meter-fill.corruption { background: linear-gradient(90deg, #ff69b4, #bd00ff); }
        .level-display { text-align: center; padding: 8px 0; }
        .level-symbol { font-size: 28px; letter-spacing: 4px; }
        .level-name { font-size: 12px; color: #888; margin-top: 4px; }
        .lock-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lock-item:last-child { border-bottom: none; }
        .lock-label { font-size: 12px; color: #aaa; }
        .lock-value { font-size: 13px; color: #fff; font-weight: 600; }
        .lock-value.locked { color: #555; cursor: pointer; user-select: none; }
        .lock-value.locked.revealed { color: #ff69b4; }
        .body-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 10px; }
        .body-stat-item { text-align: center; padding: 12px 8px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); }
        .body-stat-value { font-size: 20px; font-weight: 700; color: #fff; }
        .body-stat-label { font-size: 11px; color: #666; margin-top: 4px; }
        .body-detail { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .body-detail:last-child { border-bottom: none; }
        .body-detail-label { font-size: 11px; color: #666; margin-bottom: 2px; }
        .body-detail-value { font-size: 13px; color: #ccc; }
        .outfit-grid { display: grid; gap: 8px; padding: 4px 0; }
        .outfit-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .outfit-icon { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; background: rgba(255,105,180,0.1); border: 1px solid rgba(255,105,180,0.15); }
        .outfit-info { flex: 1; }
        .outfit-category { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px; }
        .outfit-desc { font-size: 13px; color: #ddd; }
        .quest-toggle { width: 100%; background: none; border: none; display: flex; justify-content: space-between; color: #ff69b4; font-size: 14px; font-weight: 700; cursor: pointer; padding: 0; margin-bottom: 14px; }
        .quest-toggle .arrow { transition: transform 0.2s; font-size: 12px; }
        .quest-toggle .arrow.open { transform: rotate(180deg); }
        .quest-list { display: none; gap: 8px; }
        .quest-list.open { display: grid; }
        .quest-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13px; border: 1px solid rgba(255,255,255,0.06); }
        .quest-item .quest-icon { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; flex-shrink: 0; }
        .quest-item.locked { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.04); color: #444; }
        .quest-item.locked .quest-icon { background: rgba(255,255,255,0.05); color: #444; border: 1px solid rgba(255,255,255,0.08); }
        .quest-item.available { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); color: #ddd; }
        .quest-item.available .quest-icon { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .quest-item.completed { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.2); color: #4ade80; }
        .quest-item.completed .quest-icon { background: rgba(74,222,128,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
        .quest-item .quest-stage { font-size: 10px; color: inherit; opacity: 0.6; margin-left: auto; flex-shrink: 0; }
        .mod-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .mod-item:last-child { border-bottom: none; }
        .mod-name { font-size: 13px; color: #ccc; }
        .mod-status { font-size: 12px; padding: 3px 10px; border-radius: 999px; }
        .mod-status.yes { background: rgba(74,222,128,0.15); color: #4ade80; }
        .mod-status.no { background: rgba(255,255,255,0.05); color: #666; }
        .mod-detail { padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-top: 8px; font-size: 12px; color: #aaa; line-height: 1.6; display: none; }
        .mod-detail.show { display: block; }
        .kink-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .kink-tag { padding: 6px 14px; border-radius: 999px; font-size: 12px; background: rgba(255,105,180,0.15); color: #ff69b4; border: 1px solid rgba(255,105,180,0.3); }
        .kink-tag.locked { background: rgba(255,255,255,0.03); color: #444; border-color: rgba(255,255,255,0.08); }
        .diary-btn { width: 100%; padding: 14px; background: rgba(255,105,180,0.1); border: 1px solid rgba(255,105,180,0.2); border-radius: 12px; color: #ff69b4; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .diary-btn:hover { background: rgba(255,105,180,0.15); border-color: rgba(255,105,180,0.4); }
        .diary-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; place-items: center; z-index: 100; padding: 20px; }
        .diary-overlay.show { display: grid; }
        .diary-modal { width: min(100%, 380px); max-height: 70vh; background: #1a1a1a; border: 1px solid rgba(255,105,180,0.3); border-radius: 16px; padding: 20px; overflow-y: auto; }
        .diary-modal h3 { font-size: 16px; color: #ff69b4; margin-bottom: 16px; display: flex; justify-content: space-between; }
        .diary-modal .close-btn { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; }
        .diary-entry { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .diary-entry:last-child { border-bottom: none; }
        .diary-date { font-size: 11px; color: #666; margin-bottom: 4px; }
        .diary-text { font-size: 13px; color: #ccc; line-height: 1.6; }
        /* 5 */
        .bottom-nav { display: grid; grid-template-columns: 1fr 1fr 56px 1fr 1fr; gap: 2px; padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.06); background: rgba(8,8,8,0.95); align-items: center; }
        .nav-btn { background: transparent; border: none; color: #555; padding: 8px 2px 4px; font-size: 10px; cursor: pointer; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .nav-btn .nav-icon { font-size: 18px; line-height: 1; }
        .nav-btn .nav-label { font-size: 9px; }
        .nav-btn.active { color: #ff69b4; background: rgba(255,105,180,0.1); }
        .nav-btn.home-btn { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #9b59b6, #8e44ad); border: 2px solid rgba(255,255,255,0.15); color: #fff; font-size: 22px; font-weight: 700; display: grid; place-items: center; /*  margin-top: -16px; */ box-shadow: 0 4px 16px rgba(155,89,182,0.4), inset 0 1px 0 rgba(255,255,255,0.15); cursor: pointer; transition: all 0.2s; }
        .nav-btn.home-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(155,89,182,0.5); }
        .nav-btn.home-btn.active { background: linear-gradient(135deg, #ff69b4, #bd00ff); box-shadow: 0 4px 20px rgba(189,0,255,0.4); }
        /*  */
        .forum-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
        .forum-header h2 { font-size: 16px; color: #ff69b4; font-weight: 700; }
        .forum-actions { display: flex; gap: 6px; }
        .forum-btn { border: 1px solid rgba(255,105,180,0.25); background: rgba(255,105,180,0.08); color: #ff69b4; border-radius: 8px; padding: 6px 12px; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .forum-btn:hover { background: rgba(255,105,180,0.15); border-color: rgba(255,105,180,0.4); }
        .forum-btn.post-btn { background: rgba(255,105,180,0.15); border-color: rgba(255,105,180,0.35); font-weight: 700; }
        .category-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .category-tab { border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: #888; border-radius: 999px; padding: 6px 6px; font-size: 11px; cursor: pointer; text-align: center; }
        .category-tab:hover { border-color: rgba(255,105,180,0.2); color: #ccc; }
        .category-tab.active { background: rgba(255,105,180,0.12); border-color: rgba(255,105,180,0.3); color: #ff69b4; font-weight: 600; }
        .post-list { display: grid; gap: 8px; }
        .post-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px; cursor: pointer; }
        .post-card:hover { border-color: rgba(255,105,180,0.15); background: rgba(255,255,255,0.04); }
        .post-card.open { border-color: rgba(255,105,180,0.2); background: rgba(255,255,255,0.04); }
        .post-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 14px; overflow: hidden; }
        .post-avatar.pink { background: linear-gradient(135deg, #ff69b4, #ff1493); }
        .post-avatar.purple { background: linear-gradient(135deg, #bd00ff, #7b00ff); }
        .post-avatar.blue { background: linear-gradient(135deg, #00bfff, #0066ff); }
        .post-avatar.green { background: linear-gradient(135deg, #00ff88, #00aa55); }
        .post-avatar.orange { background: linear-gradient(135deg, #ff8800, #ff4400); }
        .post-avatar.teal { background: linear-gradient(135deg, #00ffcc, #0099aa); }
        .post-avatar.red { background: linear-gradient(135deg, #ff3333, #aa0000); }
        .post-avatar.gold { background: linear-gradient(135deg, #ffd700, #ffaa00); }
        .post-avatar.silver { background: linear-gradient(135deg, #c0c0c0, #808080); }
        .post-avatar.magenta { background: linear-gradient(135deg, #ff00ff, #cc00aa); }
        .post-info { flex: 1; min-width: 0; }
        .post-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .post-meta-line { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #666; flex-wrap: wrap; }
        .post-category-tag { font-size: 9px; padding: 1px 6px; border-radius: 4px; border: 1px solid rgba(255,105,180,0.2); color: #ff69b4; background: rgba(255,105,180,0.06); }
        .post-author { color: #999; }
        .post-time { color: #555; }
        .post-stats { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #555; flex-shrink: 0; }
        .post-stats span { display: flex; align-items: center; gap: 2px; }
        .post-body { display: none; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 8px; }
        .post-body.show { display: block; }
        .post-content { font-size: 12px; color: #ccc; line-height: 1.8; margin-bottom: 10px; white-space: pre-wrap; }
        .video-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; margin-bottom: 10px; }
        .video-icon { width: 48px; height: 48px; border-radius: 8px; background: rgba(255,105,180,0.1); border: 1px solid rgba(255,105,180,0.15); display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
        .video-info { flex: 1; }
        .video-filename { font-size: 11px; color: #aaa; margin-bottom: 4px; font-family: monospace; }
        .video-desc { font-size: 11px; color: #666; line-height: 1.5; }
        .video-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; background: rgba(255,105,180,0.1); color: #ff69b4; border: 1px solid rgba(255,105,180,0.15); margin-top: 4px; }
        .reply-section { margin-top: 8px; }
        .reply-title { font-size: 11px; color: #888; margin-bottom: 6px; font-weight: 600; }
        .reply-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .reply-item:last-child { border-bottom: none; }
        .reply-avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 11px; }
        .reply-body { flex: 1; }
        .reply-author { font-size: 11px; color: #ff69b4; font-weight: 600; margin-bottom: 2px; }
        .reply-text { font-size: 11px; color: #aaa; line-height: 1.5; }
        .reply-text .time { display: block; margin-top: 4px; font-size: 9px; color: #555; }
        .post-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; place-items: center; z-index: 100; padding: 20px; }
        .post-overlay.show { display: grid; }
        .post-modal { width: min(100%, 380px); background: #1a1a1a; border: 1px solid rgba(255,105,180,0.3); border-radius: 16px; padding: 20px; }
        .post-modal h3 { font-size: 16px; color: #ff69b4; margin-bottom: 16px; display: flex; justify-content: space-between; }
        .post-modal .close-btn { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; }
        .post-form { display: grid; gap: 12px; }
        .post-form label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
        .post-form select, .post-form input, .post-form textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; color: #ddd; font-size: 13px; outline: none; }
        .post-form select:focus, .post-form input:focus, .post-form textarea:focus { border-color: rgba(255,105,180,0.3); }
        .post-form textarea { min-height: 100px; resize: vertical; }
        .post-submit-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #ff69b4, #bd00ff); border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }
        .post-submit-btn:hover { filter: brightness(1.1); }
        /*  */
        .messages-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .messages-header h2 { font-size: 16px; color: #ff69b4; font-weight: 700; }
        .msg-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
        .msg-tab { flex: 1; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); color: #888; border-radius: 8px; padding: 8px; font-size: 11px; cursor: pointer; text-align: center; }
        .msg-tab.active { background: rgba(255,105,180,0.1); border-color: rgba(255,105,180,0.25); color: #ff69b4; font-weight: 600; }
        .contact-list { display: grid; gap: 8px; }
        .contact-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
        .contact-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,105,180,0.15); }
        .contact-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 18px; }
        .contact-avatar.mine { background: linear-gradient(135deg, #ff69b4, #bd00ff); }
        .contact-avatar.chris { background: linear-gradient(135deg, #333333, #666666); }
        .contact-avatar.yumi { background: linear-gradient(135deg, #ff1493, #ff69b4); }
        .contact-avatar.wife { background: linear-gradient(135deg, #4fc3f7, #0288d1); }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 3px; }
        .contact-preview { font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .contact-time { font-size: 10px; color: #555; flex-shrink: 0; }
        .notice-item { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 8px; }
        .notice-title { font-size: 12px; color: #ff69b4; font-weight: 600; margin-bottom: 4px; }
        .notice-text { font-size: 11px; color: #888; line-height: 1.5; }
        .notice-time { font-size: 9px; color: #555; margin-top: 6px; }
        .chat-view { display: flex; flex-direction: column; height: 100%; }
        .chat-header { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 12px; }
        .chat-header .back-btn { background: none; border: none; color: #aaa; font-size: 16px; cursor: pointer; padding: 4px; }
        .chat-header .chat-name { font-size: 15px; font-weight: 600; color: #fff; }
        .chat-header .chat-status { font-size: 10px; color: #666; margin-left: auto; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 4px 0; margin-bottom: 12px; }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 12px; line-height: 1.6; }
        .chat-bubble.sent { align-self: flex-end; background: linear-gradient(135deg, #ff69b4, #bd00ff); color: #fff; border-bottom-right-radius: 4px; }
        .chat-bubble.received { align-self: flex-start; background: rgba(255,255,255,0.06); color: #ddd; border-bottom-left-radius: 4px; }
        .chat-bubble .bubble-time { display: block; font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 4px; text-align: right; }
        .chat-bubble.received .bubble-time { color: #666; }
        .chat-input-area { display: flex; gap: 8px; align-items: flex-end; }
        .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px 14px; color: #ddd; font-size: 13px; outline: none; resize: none; min-height: 40px; max-height: 100px; }
        .chat-input:focus { border-color: rgba(255,105,180,0.3); }
        .chat-send-btn { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #ff69b4, #bd00ff); border: none; color: #fff; font-size: 16px; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; }
        .chat-send-btn:hover { filter: brightness(1.1); }
        /*  */
        .ranking-section { display: grid; gap: 10px; }
        .ranking-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; }
        .ranking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ranking-header h3 { font-size: 14px; font-weight: 700; color: #ff69b4; margin: 0; }
        .ranking-header .hot-icon { font-size: 16px; animation: hotPulse 1s ease-in-out infinite; }
        .rank-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-item:last-child { border-bottom: none; }
        .rank-number { width: 24px; font-size: 13px; font-weight: 800; color: #555; text-align: center; flex-shrink: 0; }
        .rank-number.gold { color: #ffd700; }
        .rank-number.silver { color: #c0c0c0; }

        function renderForum(container) { var posts = wifeData.forumPosts; if (selectedCategory >= 0) { var f = []; for(var i=0;i<posts.length;i++){if(posts[i].category===selectedCategory)f.push(posts[i]);} posts=f; } var html = '<div class="forum-header"><h2> QOS </h2><div class="forum-actions"><button class="forum-btn post-btn" onclick="openPostModal()"></button><button class="forum-btn" onclick="refreshForum()"></button></div></div>'; html += '<div class="category-nav"><span class="category-tab '+(selectedCategory===-1?"active":"")+'" onclick="filterCategory(-1)"> </span>'; for(var i=0;i<categoryNames.length;i++){ html+='<span class="category-tab '+(selectedCategory===i?"active":"")+'" onclick="filterCategory('+i+')">'+catIcons[i]+' '+categoryNames[i]+'</span>'; } html += '</div><div class="post-list">'; if(posts.length===0) html+='<div style="text-align:center;padding:40px 0;color:#444;font-size:13px;"></div>'; for(var i=0;i<posts.length;i++){ var p=posts[i]; var isOpen=(openPostId===p.id); var cn=categoryNames[p.category]||""; var ci=catIcons[p.category]||""; var ac=(p.gender==="")?"#66ccff":"#ff69b4"; html+='<div class="post-card '+(isOpen?"open":"")+'" onclick="togglePost(\''+p.id+'\')"><div class="post-top"><div class="post-avatar '+p.avatarClass+'">'+p.avatarIcon+'</div><div class="post-info"><div class="post-title">'+escapeHtml(p.title)+'</div><div class="post-meta-line"><span class="post-category-tag">'+ci+' '+cn+'</span><span class="post-author" style="color:'+ac+'">'+p.author+'</span><span class="post-time">'+p.time+'</span></div></div><div class="post-stats"><span> '+p.likes+'</span><span> '+p.replies.length+'</span></div></div>'; html+='<div class="post-body '+(isOpen?"show":"")+'">'; if(p.video){ html+='<div class="video-card"><div class="video-icon"></div><div class="video-info"><div class="video-filename"> '+escapeHtml(p.video.filename)+'</div><div class="video-desc">'+escapeHtml(p.video.desc)+'</div><span class="video-badge">'+p.video.size+'</span></div></div>'; } html+='<div class="post-content">'+escapeHtml(p.content)+'</div>'; if(p.replies.length>0){ html+='<div class="reply-section"><div class="reply-title"> '+p.replies.length+'</div>'; for(var r=0;r<p.replies.length;r++){ html+='<div class="reply-item"><div class="reply-avatar" style="font-size:12px;display:grid;place-items:center;"></div><div class="reply-body"><div class="reply-author">'+p.replies[r].author+'</div><div class="reply-text">'+escapeHtml(p.replies[r].text)+'<span class="time">'+p.replies[r].time+'</span></div></div></div>'; } html+='</div>'; } html+='</div></div>'; } html+='</div>'; container.innerHTML=html; }

        function renderMessages(container) { if (msgView === 'chat' && chatTarget) { renderChat(container,chatTarget); return; } var html = '<div class="messages-header"><h2> </h2></div>'; html += '<div class="msg-tabs"><span class="msg-tab '+(msgTab==='chat'?'active':'')+'" onclick="switchMsgTab(\'chat\')"> </span><span class="msg-tab '+(msgTab==='notice'?'active':'')+'" onclick="switchMsgTab(\'notice\')"> </span></div>'; if (msgTab === 'chat') { html += '<div class="contact-list">'; for (var i = 0; i < contacts.length; i++) { var c = contacts[i]; if (c.isSelf) continue; var chat = chatData[c.id]; var lastMsg = (chat && chat.messages.length>0) ? chat.messages[chat.messages.length-1].text : ''; var lastTime = (chat && chat.messages.length>0) ? chat.messages[chat.messages.length-1].time : ''; var preview = lastMsg.length>25 ? lastMsg.slice(0,25)+'...' : lastMsg; html += '<div class="contact-item" onclick="openChat(\''+c.id+'\')"><div class="contact-avatar '+c.avatarClass+'">'+c.icon+'</div><div class="contact-info"><div class="contact-name">'+c.name+'</div><div class="contact-preview">'+escapeHtml(preview)+'</div></div><div class="contact-time">'+lastTime.slice(-5)+'</div></div>'; } html += '</div>'; } else { html += '<div class="notice-item"><div class="notice-title"> </div><div class="notice-text"> QOS App</div><div class="notice-time">2045/09/12</div></div>'; html += '<div class="notice-item"><div class="notice-title"> </div><div class="notice-text"></div><div class="notice-time">2045/09/11</div></div>'; } container.innerHTML = html; }
        function renderChat(container,contactId) { var contact = null; for(var i=0;i<contacts.length;i++){if(contacts[i].id===contactId){contact=contacts[i];break;}} if(!contact){msgView='list';render();return;} var chat = chatData[contactId]||{messages:[]}; var html='<div class="chat-view">'; html+='<div class="chat-header"><button class="back-btn" onclick="closeChat()"></button><div class="contact-avatar '+contact.avatarClass+'" style="width:32px;height:32px;font-size:14px;">'+contact.icon+'</div><div class="chat-name">'+contact.name+'</div><div class="chat-status"></div></div>'; html+='<div class="chat-messages" id="chatMessages">'; for(var i=0;i<chat.messages.length;i++){var msg=chat.messages[i];var isMine=(msg.from==='myself'); html+='<div class="chat-bubble '+(isMine?'sent':'received')+'">'+escapeHtml(msg.text)+'<span class="bubble-time">'+msg.time.slice(-5)+'</span></div>';} html+='</div><div class="chat-input-area"><textarea class="chat-input" id="chatInput" placeholder="..." rows="1" onkeydown="handleChatKeyDown(event)"></textarea><button class="chat-send-btn" onclick="sendChatMessage(\''+contactId+'\')"></button></div></div>'; container.innerHTML=html; setTimeout(function(){var cd=document.getElementById('chatMessages');if(cd)cd.scrollTop=cd.scrollHeight;var inp=document.getElementById('chatInput');if(inp)inp.focus();},100); }

        function renderRanking(container) { var allPosts = wifeData.forumPosts.slice(); allPosts.sort(function(a,b){return b.likes-a.likes;}); var topPosts = allPosts.slice(0,5); var rankClass = ["gold","silver","bronze","",""]; var rankIcon = ["","","","4","5"]; var html = '<div class="ranking-section">'; html += '<div class="ranking-card"><div class="ranking-header"><h3> QOS </h3><span class="hot-icon"></span></div>'; for (var i = 0; i < queenRankings.length; i++) { var q = queenRankings[i]; var rIcon = (i<3)?rankIcon[i]:(i+1); html += '<div class="rank-item"><span class="rank-number '+(rankClass[i]||'')+'">'+rIcon+'</span><div class="rank-avatar '+q.avatarClass+'">'+q.icon+'</div><div class="rank-info"><div class="rank-name">'+q.name+'<span class="title-tag">'+q.title+'</span></div><div class="rank-meta"> '+q.heat+'</div></div><span class="rank-heat">'+q.heat+'</span></div>'; } html += '<div class="bond-status-box"><div><div class="bond-label"></div><div class="bond-name"></div></div><div class="bond-status"></div></div></div>'; html += '<div class="ranking-card"><div class="ranking-header"><h3>  TOP5</h3><span class="hot-icon"></span></div>'; for (var i = 0; i < topPosts.length; i++) { var p = topPosts[i]; var rIcon = (i<3)?rankIcon[i]:(i+1); var cn = categoryNames[p.category]||""; html += '<div class="rank-post-item"><span class="rank-number '+(rankClass[i]||'')+'">'+rIcon+'</span><span class="rank-post-cat">'+cn+'</span><span class="rank-post-title">'+escapeHtml(p.title)+'</span><span class="rank-post-heat">'+p.likes+'</span></div>'; } html += '</div></div>'; container.innerHTML = html; }

        function renderProfile(container) { var level = wifeData.qosLevel; var cup = getCupSize(level); var isLocked = (level >= 3); var statusText = "", statusClass = ""; if(isLocked){statusText=" ";statusClass="locked";} var partnerDisplay = wifeData.currentPartner, partnerLocked = false; if(level>=3){partnerDisplay=" ";partnerLocked=true;} var affairDisplay = wifeData.affairCount+"", affairLocked = false; if(level>=3){affairDisplay=" ";affairLocked=true;} var html = '<div class="profile-header"><div class="profile-avatar">'+(wifeData.avatar?'<img src="'+wifeData.avatar+'" onerror="this.style.display=none">':'')+'</div><div class="profile-name">'+wifeData.name+'</div><div class="profile-meta">'+wifeData.age+'  '+wifeData.role+'</div><span class="profile-status '+statusClass+'">'+statusText+'</span></div>'; html += '<div class="card"><div class="card-title"> </div><div class="level-display"><div class="level-symbol">'+levelSymbols[level]+'</div><div class="level-name">'+levelNames[level]+'</div></div><div class="meter-row"><div class="meter-label"><span></span><span>'+wifeData.corruption+'%</span></div><div class="meter-track"><div class="meter-fill corruption" style="width:'+wifeData.corruption+'%"></div></div></div><div class="lock-item"><span class="lock-label"></span><span class="lock-value '+(partnerLocked?"locked":"")+'" data-key="partner"'+(partnerLocked?' onclick="toggleLock(this)"':'')+'>'+partnerDisplay+'</span></div><div class="lock-item"><span class="lock-label"></span><span class="lock-value '+(affairLocked?"locked":"")+'" data-key="affair"'+(affairLocked?' onclick="toggleLock(this)"':'')+'>'+affairDisplay+'</span></div></div>'; html += '<div class="card"><div class="card-title"> </div><div class="body-stats"><div class="body-stat-item"><div class="body-stat-value">'+cup+'</div><div class="body-stat-label"></div></div><div class="body-stat-item"><div class="body-stat-value">'+wifeData.sexCount+'</div><div class="body-stat-label"></div></div></div><div class="body-detail"><div class="body-detail-label"></div><div class="body-detail-value">'+(genitalColors[wifeData.genitalColor]||wifeData.genitalColor)+'</div></div><div class="body-detail"><div class="body-detail-label"></div></div><div class="outfit-grid">'; for(var i=0;i<outfitCategories.length;i++){ var oc=outfitCategories[i]; html+='<div class="outfit-item"><div class="outfit-icon">'+oc.icon+'</div><div class="outfit-info"><div class="outfit-category">'+oc.label+'</div><div class="outfit-desc">'+(wifeData.outfit[oc.key]||"")+'</div></div></div>'; } html += '</div></div>'; html += '<div class="card"><div class="card-title"> </div><div class="mod-item" onclick="toggleModDetail(\'tattoo\')"><span class="mod-name">QoS</span><span class="mod-status '+(wifeData.tattoos.has?"yes":"no")+'">'+(wifeData.tattoos.has?" ":" ")+'</span></div><div class="mod-detail" id="mod-tattoo">'+(wifeData.tattoos.has?'<strong></strong>'+wifeData.tattoos.position+'<br><strong></strong>'+wifeData.tattoos.desc:'')+'</div><div class="mod-item" onclick="toggleModDetail(\'piercing\')"><span class="mod-name"></span><span class="mod-status '+(wifeData.piercings.has?"yes":"no")+'">'+(wifeData.piercings.has?" ":" ")+'</span></div><div class="mod-detail" id="mod-piercing">'+(wifeData.piercings.has?'<strong></strong>'+wifeData.piercings.position+'<br><strong></strong>'+wifeData.piercings.desc:'')+'</div></div>'; html += '<div class="card"><div class="card-title"> </div><div class="kink-list">'; for(var i=0;i<allKinks.length;i++){ var k=allKinks[i]; var unlocked=(level>=k.level); html+='<span class="kink-tag '+(unlocked?"":"locked")+'">'+(unlocked?k.name:"?")+'</span>'; } html += '</div></div>'; html += '<button class="diary-btn" onclick="openDiary()"><span> </span><span></span></button>'; container.innerHTML = html; }

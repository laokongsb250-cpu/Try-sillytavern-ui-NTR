<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QOS App</title>

<style>
/* =========================================================
   QOS App 布局隔离
   ========================================================= */

html,
body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

#qos-phone,
#qos-phone * {
    box-sizing: border-box;
}

#qos-phone {
    width: 100%;
    max-width: 100%;
    height: 500px;
    min-height: 500px;
    margin: 0 auto;
    padding: 0;

    display: flex !important;
    flex-direction: column !important;

    position: relative;
    overflow: hidden;
    isolation: isolate;

    background: #0f0f0f;
    color: #e0e0e0;
}

/* 内容区域 */
#qos-phone > .app-container {
    display: block !important;

    width: 100%;
    height: auto !important;
    min-width: 0;
    min-height: 0 !important;

    flex: 1 1 auto !important;

    padding: 12px;

    overflow-x: hidden !important;
    overflow-y: auto !important;

    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.15) transparent;
}

#qos-phone > .app-container::-webkit-scrollbar {
    width: 4px;
}

#qos-phone > .app-container::-webkit-scrollbar-track {
    background: transparent;
}

#qos-phone > .app-container::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.15);
    border-radius: 999px;
}

/* 底部菜单 */
#qos-phone > .qos-bottom-nav {
    display: grid !important;

    width: 100%;
    height: 76px !important;
    min-height: 76px !important;

    flex: 0 0 76px !important;
    flex-shrink: 0 !important;

    grid-template-columns:
        minmax(0, 1fr)
        minmax(0, 1fr)
        56px
        minmax(0, 1fr)
        minmax(0, 1fr);

    gap: 2px;
    padding: 10px 12px;

    position: relative;
    z-index: 20;

    align-items: center;

    border-top: 1px solid rgba(255,255,255,.08);
    background: rgba(8,8,8,.98);
}

/* 菜单按钮 */
#qos-phone > .qos-bottom-nav .nav-btn {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;

    width: 100%;
    min-width: 0;
    height: 46px;
    min-height: 42px;

    margin: 0;
    padding: 6px 2px 4px;

    overflow: hidden;

    border: none;
    border-radius: 8px;

    background: transparent;
    color: #666;

    font-family: inherit;
    font-size: 10px;
    line-height: 1.2;

    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
}

#qos-phone > .qos-bottom-nav .nav-btn:hover {
    background: rgba(255,255,255,.05);
    color: #ddd;
}

#qos-phone > .qos-bottom-nav .nav-btn.active {
    background: rgba(255,105,180,.1);
    color: #ff69b4;
}

#qos-phone > .qos-bottom-nav .nav-icon {
    display: block !important;
    width: auto;
    height: 20px;
    color: inherit;
    font-size: 18px;
    line-height: 20px;
    text-align: center;
}

#qos-phone > .qos-bottom-nav .nav-label {
    display: block !important;
    width: auto;
    height: 14px;
    color: inherit;
    font-size: 9px;
    line-height: 14px;
    white-space: nowrap;
}

/* 中间 Q 按钮 */
#qos-phone > .qos-bottom-nav .home-btn {
    display: grid !important;
    place-items: center !important;

    width: 56px !important;
    height: 56px !important;
    min-width: 56px !important;
    min-height: 56px !important;

    margin: 0 auto;
    padding: 0;

    border: 2px solid rgba(255,255,255,.15);
    border-radius: 50%;

    background: linear-gradient(135deg,#9b59b6,#8e44ad);
    color: #fff;

    font-size: 22px;
    font-weight: 700;
    line-height: 1;

    box-shadow:
        0 4px 16px rgba(155,89,182,.4),
        inset 0 1px 0 rgba(255,255,255,.15);
}

#qos-phone > .qos-bottom-nav .home-btn:hover {
    transform: scale(1.05);
}

#qos-phone > .qos-bottom-nav .home-btn.active {
    background: linear-gradient(135deg,#ff69b4,#bd00ff);
    box-shadow: 0 4px 20px rgba(189,0,255,.4);
}

/* 通用文本和卡片 */
#qos-phone h1,
#qos-phone h2,
#qos-phone h3,
#qos-phone p {
    margin-top: 0;
}

.qos-card {
    margin-bottom: 12px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    background: rgba(255,255,255,.04);
}

.qos-card-title {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
    color: #ff69b4;
    font-size: 14px;
    font-weight: 700;
}

.qos-empty {
    padding: 40px 0;
    color: #555;
    font-size: 13px;
    text-align: center;
}

/* 首页 */
.home-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 0 24px;
    text-align: center;
}

.home-spade {
    height: 120px;
    margin-bottom: 4px;
    color: #ff69b4;
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 0 30px rgba(189,0,255,.35);
}

.home-spade::before {
    content: "♠";
}

.home-spade-q {
    margin-top: -18px;
    margin-bottom: 18px;
    color: rgba(255,255,255,.1);
    font-size: 46px;
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1;
}

.home-welcome {
    margin-bottom: 4px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
}

.home-sub {
    margin-bottom: 18px;
    color: #888;
    font-size: 12px;
}

.home-divider {
    width: 60px;
    height: 2px;
    margin: 0 auto;
    background: linear-gradient(90deg,transparent,#ff69b4,transparent);
}

.home-activity-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
}

.home-activity-item:last-child {
    border-bottom: none;
}

.home-activity-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: rgba(255,105,180,.15);
    font-size: 14px;
}

.home-activity-text {
    flex: 1;
    min-width: 0;
    color: #ccc;
    font-size: 12px;
}

.home-activity-time {
    flex-shrink: 0;
    color: #555;
    font-size: 10px;
}

/* 论坛 */
.forum-header,
.messages-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
}

.forum-header h2,
.messages-header h2 {
    margin: 0;
    color: #ff69b4;
    font-size: 16px;
    font-weight: 700;
}

.forum-actions {
    display: flex;
    gap: 6px;
}

.forum-btn {
    padding: 6px 10px;
    border: 1px solid rgba(255,105,180,.25);
    border-radius: 8px;
    background: rgba(255,105,180,.08);
    color: #ff69b4;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
}

.forum-btn:hover {
    background: rgba(255,105,180,.15);
}

.category-nav {
    display: grid;
    grid-template-columns: repeat(3,minmax(0,1fr));
    gap: 6px;
    margin-bottom: 12px;
}

.category-tab {
    padding: 6px 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 999px;
    background: rgba(255,255,255,.03);
    color: #888;
    font-size: 11px;
    text-align: center;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
}

.category-tab.active {
    border-color: rgba(255,105,180,.3);
    background: rgba(255,105,180,.12);
    color: #ff69b4;
}

.post-list {
    display: grid;
    gap: 8px;
}

.post-card {
    padding: 12px;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 10px;
    background: rgba(255,255,255,.03);
    cursor: pointer;
}

.post-card:hover,
.post-card.open {
    border-color: rgba(255,105,180,.2);
    background: rgba(255,255,255,.045);
}

.post-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
}

.post-avatar,
.reply-avatar,
.contact-avatar,
.rank-avatar {
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border-radius: 50%;
}

.post-avatar {
    width: 32px;
    height: 32px;
    font-size: 14px;
}

.reply-avatar {
    width: 24px;
    height: 24px;
    font-size: 11px;
}

.contact-avatar {
    width: 44px;
    height: 44px;
    font-size: 18px;
}

.rank-avatar {
    width: 36px;
    height: 36px;
    font-size: 16px;
}

.avatar-pink {
    background: linear-gradient(135deg,#ff69b4,#ff1493);
}

.avatar-purple {
    background: linear-gradient(135deg,#bd00ff,#7b00ff);
}

.avatar-blue {
    background: linear-gradient(135deg,#00bfff,#0066ff);
}

.avatar-green {
    background: linear-gradient(135deg,#00ff88,#00aa55);
}

.avatar-orange {
    background: linear-gradient(135deg,#ff8800,#ff4400);
}

.avatar-gray {
    background: linear-gradient(135deg,#333,#666);
}

.avatar-cyan {
    background: linear-gradient(135deg,#4fc3f7,#0288d1);
}

.post-info,
.contact-info,
.rank-info,
.reply-body {
    flex: 1;
    min-width: 0;
}

.post-title {
    overflow: hidden;
    margin-bottom: 3px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.post-meta-line {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 5px;
    color: #666;
    font-size: 10px;
}

.post-category-tag {
    padding: 1px 5px;
    border: 1px solid rgba(255,105,180,.2);
    border-radius: 4px;
    background: rgba(255,105,180,.06);
    color: #ff69b4;
    font-size: 9px;
}

.post-stats {
    display: flex;
    flex-shrink: 0;
    gap: 6px;
    color: #555;
    font-size: 10px;
}

.post-body {
    display: none;
    padding-top: 10px;
    margin-top: 8px;
    border-top: 1px solid rgba(255,255,255,.05);
}

.post-body.show {
    display: block;
}

.post-content {
    margin-bottom: 10px;
    color: #ccc;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
}

.reply-title {
    margin-bottom: 5px;
    color: #888;
    font-size: 11px;
    font-weight: 600;
}

.reply-item {
    display: flex;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,.03);
}

.reply-item:last-child {
    border-bottom: none;
}

.reply-author {
    margin-bottom: 2px;
    color: #ff69b4;
    font-size: 11px;
    font-weight: 600;
}

.reply-text {
    color: #aaa;
    font-size: 11px;
    line-height: 1.5;
}

.reply-time {
    display: block;
    margin-top: 3px;
    color: #555;
    font-size: 9px;
}

/* 消息 */
.msg-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
}

.msg-tab {
    flex: 1;
    padding: 8px;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px;
    background: rgba(255,255,255,.02);
    color: #888;
    font-size: 11px;
    text-align: center;
    cursor: pointer;
}

.msg-tab.active {
    border-color: rgba(255,105,180,.25);
    background: rgba(255,105,180,.1);
    color: #ff69b4;
}

.contact-list {
    display: grid;
    gap: 8px;
}

.contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    background: rgba(255,255,255,.02);
    cursor: pointer;
}

.contact-item:hover {
    background: rgba(255,255,255,.05);
}

.contact-name {
    margin-bottom: 3px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
}

.contact-preview {
    overflow: hidden;
    color: #666;
    font-size: 11px;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.contact-time {
    flex-shrink: 0;
    color: #555;
    font-size: 10px;
}

.notice-item {
    margin-bottom: 8px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    background: rgba(255,255,255,.02);
}

.notice-title {
    margin-bottom: 4px;
    color: #ff69b4;
    font-size: 12px;
    font-weight: 600;
}

.notice-text {
    color: #888;
    font-size: 11px;
    line-height: 1.5;
}

.notice-time {
    margin-top: 6px;
    color: #555;
    font-size: 9px;
}

/* 聊天 */
.chat-view {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    min-height: 0;
}

.chat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
}

.back-btn {
    padding: 4px;
    border: none;
    background: none;
    color: #aaa;
    font-size: 18px;
    cursor: pointer;
}

.chat-name {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
}

.chat-status {
    margin-left: auto;
    color: #666;
    font-size: 10px;
}

.chat-messages {
    display: flex;
    flex: 1 1 auto;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
    margin-bottom: 12px;
    padding: 4px 0;
    overflow-y: auto;
}

.chat-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
}

.chat-bubble.sent {
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    background: linear-gradient(135deg,#ff69b4,#bd00ff);
    color: #fff;
}

.chat-bubble.received {
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    background: rgba(255,255,255,.06);
    color: #ddd;
}

.bubble-time {
    display: block;
    margin-top: 4px;
    color: rgba(255,255,255,.55);
    font-size: 9px;
    text-align: right;
}

.chat-input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
}

.chat-input {
    flex: 1;
    min-height: 40px;
    max-height: 100px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px;
    outline: none;
    background: rgba(255,255,255,.05);
    color: #ddd;
    font-family: inherit;
    font-size: 13px;
    resize: none;
}

.chat-send-btn {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg,#ff69b4,#bd00ff);
    color: #fff;
    font-size: 17px;
    cursor: pointer;
}

/* 排行 */
.ranking-section {
    display: grid;
    gap: 10px;
}

.ranking-card {
    padding: 14px;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    background: rgba(255,255,255,.03);
}

.ranking-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.ranking-header h3 {
    margin: 0;
    color: #ff69b4;
    font-size: 14px;
}

.rank-item,
.rank-post-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
}

.rank-item:last-child,
.rank-post-item:last-child {
    border-bottom: none;
}

.rank-number {
    width: 24px;
    flex-shrink: 0;
    color: #555;
    font-size: 13px;
    font-weight: 800;
    text-align: center;
}

.rank-number.gold {
    color: #ffd700;
}

.rank-number.silver {
    color: #c0c0c0;
}

.rank-number.bronze {
    color: #cd7f32;
}

.rank-name {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
}

.rank-meta {
    margin-top: 2px;
    color: #666;
    font-size: 10px;
}

.rank-heat,
.rank-post-heat {
    flex-shrink: 0;
    color: #ff69b4;
    font-size: 12px;
    font-weight: 700;
}

.rank-post-cat {
    flex-shrink: 0;
    padding: 1px 5px;
    border: 1px solid rgba(255,105,180,.2);
    border-radius: 4px;
    color: #ff69b4;
    font-size: 9px;
}

.rank-post-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    color: #ccc;
    font-size: 12px;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.bond-status-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding: 12px 14px;
    border: 2px solid rgba(255,105,180,.3);
    border-radius: 12px;
    background: rgba(255,105,180,.06);
}

.bond-label {
    color: #aaa;
    font-size: 12px;
}

.bond-name {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
}

.bond-status {
    color: #888;
    font-size: 11px;
}

/* 个人资料 */
.profile-header {
    padding: 20px 0;
    text-align: center;
}

.profile-avatar {
    width: 100px;
    height: 100px;
    margin: 0 auto 12px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: linear-gradient(135deg,#ff69b4,#bd00ff);
    font-size: 42px;
}

.profile-name {
    margin-bottom: 4px;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
}

.profile-meta {
    margin-bottom: 8px;
    color: #888;
    font-size: 13px;
}

.profile-status {
    display: inline-block;
    padding: 4px 12px;
    border: 1px solid rgba(255,105,180,.3);
    border-radius: 999px;
    background: rgba(255,105,180,.15);
    color: #ff69b4;
    font-size: 12px;
}

.profile-status.locked {
    border-color: rgba(255,77,77,.3);
    background: rgba(255,77,77,.1);
    color: #ff4d4d;
}

.meter-row {
    margin-bottom: 14px;
}

.meter-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 12px;
}

.meter-label span:first-child {
    color: #aaa;
}

.meter-label span:last-child {
    color: #fff;
    font-weight: 600;
}

.meter-track {
    height: 8px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
}

.meter-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg,#ff69b4,#bd00ff);
}

.level-display {
    padding: 8px 0;
    text-align: center;
}

.level-symbol {
    font-size: 26px;
    letter-spacing: 4px;
}

.level-name {
    margin-top: 4px;
    color: #888;
    font-size: 12px;
}

.lock-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
}

.lock-item:last-child {
    border-bottom: none;
}

.lock-label {
    color: #aaa;
    font-size: 12px;
}

.lock-value {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
}

.lock-value.locked {
    color: #555;
    cursor: pointer;
    user-select: none;
}

.lock-value.revealed {
    color: #ff69b4;
}

.body-stats {
    display: grid;
    grid-template-columns: repeat(2,minmax(0,1fr));
    gap: 12px;
    margin-bottom: 10px;
}

.body-stat-item {
    padding: 12px 8px;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 10px;
    background: rgba(255,255,255,.03);
    text-align: center;
}

.body-stat-value {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
}

.body-stat-label {
    margin-top: 4px;
    color: #666;
    font-size: 11px;
}

.body-detail {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
}

.body-detail-label {
    margin-bottom: 2px;
    color: #666;
    font-size: 11px;
}

.body-detail-value {
    color: #ccc;
    font-size: 13px;
}

.outfit-grid {
    display: grid;

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return "";
        }

        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

        try {
            var topWindow = window.top || window.parent || window;
            var textarea = topWindow.document.querySelector("#send_textarea") ||
                topWindow.document.querySelector("textarea");

            if (!textarea) {
                return;
            }

            var descriptor = Object.getOwnPropertyDescriptor(
                window.HTMLTextAreaElement.prototype,
                "value"
            );

            if (descriptor && descriptor.set) {
                descriptor.set.call(textarea, text);
            } else {
                textarea.value = text;
            }

            textarea.dispatchEvent(new Event("input", { bubbles: true }));
            textarea.dispatchEvent(new Event("change", { bubbles: true }));
            textarea.focus();
        } catch (error) {
            console.log("[QOS] 无法填充酒馆输入框:", error.message);

    function sendChatMessage(contactId) {
        var input = document.getElementById("chatInput");

        if (!input) {
            return;
        }

        var text = input.value.trim();

        if (!text) {
            return;
        }

        if (!chatData[contactId]) {
            chatData[contactId] = { messages: [] };
        }

        chatData[contactId].messages.push({
            from: "myself",
            text: text,
            time: getNowTime()
        });

        var contact = contacts.find(function (item) {
            return item.id === contactId;
        });

        fillSTInput(
            "你给" +
            (contact ? contact.name : contactId) +
            "发送了消息：" +
            text
        );

        input.value = "";
        render();

        setTimeout(function () {
            var messagesBox = document.getElementById("chatMessages");
            var newInput = document.getElementById("chatInput");

            if (messagesBox) {
                messagesBox.scrollTop = messagesBox.scrollHeight;
            }

            if (newInput) {
                newInput.focus();
            }
        }, 50);
    }

        var overlay = root().querySelector(".post-overlay");

        if (overlay) {
            overlay.classList.remove("show");
        }
    }

    function submitPost() {
        var category = document.getElementById("postCategory");
        var title = document.getElementById("postTitle");
        var content = document.getElementById("postContent");

        if (!category || !title || !content) {
            return;
        }

        var titleText = title.value.trim();
        var contentText = content.value.trim();

        if (!titleText || !contentText) {
            alert("标题和内容不能为空！");
            return;
        }

        wifeData.forumPosts.unshift({
            id: "user_" + Date.now(),
            category: Number(category.value) || 0,
            title: titleText,
            content: contentText,
            author: wifeData.name,
            avatar: "avatar-pink",
            likes: 0,
            time: "刚刚",
            replies: []
        });

        fillSTInput("你在论坛上发布了一个新帖子：" + contentText);
        closePostModal();
        switchTab("forum");
    }

    window.qosInit = qosInit;
    window.switchTab = switchTab;
    window.togglePost = togglePost;
    window.filterCategory = filterCategory;
    window.refreshForum = refreshForum;
    window.switchMsgTab = switchMsgTab;
    window.openChat = openChat;
    window.closeChat = closeChat;
    window.handleChatKeyDown = handleChatKeyDown;
    window.sendChatMessage = sendChatMessage;
    window.toggleLock = toggleLock;
    window.openDiary = openDiary;
    window.closeDiary = closeDiary;
    window.openPostModal = openPostModal;
    window.closePostModal = closePostModal;
    window.submitPost = submitPost;

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", qosInit);
    } else {
        qosInit();
    }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QOS App</title>
<style>
:root{--qos-height:600px;--qos-width:420px;--pink:#ff69b4;--purple:#bd00ff;--bg:#0f0f0f;--card:rgba(255,255,255,.045);--line:rgba(255,255,255,.09)}
*{box-sizing:border-box}
html,body{margin:0!important;padding:0!important;background:#0a0a0a!important;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#qos-phone{width:100%!important;max-width:var(--qos-width)!important;height:var(--qos-height)!important;min-height:var(--qos-height)!important;max-height:var(--qos-height)!important;margin:0 auto!important;padding:0!important;display:flex!important;flex-direction:column!important;position:relative!important;overflow:hidden!important;background:var(--bg)!important;color:#e0e0e0;isolation:isolate;border-radius:10px}
#qos-phone button,#qos-phone input,#qos-phone textarea,#qos-phone select{font-family:inherit}
#qos-phone .qos-content{display:block!important;width:100%!important;min-width:0!important;min-height:0!important;height:auto!important;flex:1 1 auto!important;order:1!important;overflow-x:hidden!important;overflow-y:auto!important;padding:12px!important;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
#qos-phone .qos-content::-webkit-scrollbar{width:4px}
#qos-phone .qos-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:5px}
#qos-phone .qos-bottom-nav{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr)) 56px repeat(2,minmax(0,1fr))!important;align-items:center!important;gap:3px!important;width:100%!important;height:76px!important;min-height:76px!important;max-height:76px!important;flex:0 0 76px!important;order:2!important;margin:0!important;padding:9px 10px!important;position:relative!important;top:auto!important;right:auto!important;bottom:auto!important;left:auto!important;z-index:30!important;pointer-events:auto!important;border-top:1px solid var(--line);background:rgba(8,8,8,.98)}
#qos-phone .qos-nav-btn{display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;width:100%!important;height:52px!important;min-height:42px!important;margin:0!important;padding:5px 2px!important;border:0!important;border-radius:9px!important;background:transparent!important;color:#666!important;font-size:10px!important;line-height:1.2!important;cursor:pointer!important;pointer-events:auto!important}
#qos-phone .qos-nav-btn:hover{background:rgba(255,255,255,.06)!important;color:#ddd!important}
#qos-phone .qos-nav-btn.active{background:rgba(255,105,180,.12)!important;color:var(--pink)!important}
#qos-phone .qos-nav-icon{display:block!important;height:22px!important;font-size:18px!important;line-height:22px!important}
#qos-phone .qos-nav-label{display:block!important;height:15px!important;font-size:9px!important;line-height:15px!important;white-space:nowrap}
#qos-phone .qos-home-btn{display:grid!important;place-items:center!important;width:56px!important;height:56px!important;min-width:56px!important;min-height:56px!important;margin:0 auto!important;padding:0!important;border:2px solid rgba(255,255,255,.2)!important;border-radius:50%!important;background:linear-gradient(135deg,#9b59b6,#8e44ad)!important;color:#fff!important;font-size:22px!important;font-weight:700!important;cursor:pointer!important;box-shadow:0 4px 18px rgba(155,89,182,.4)}
#qos-phone .qos-home-btn.active{background:linear-gradient(135deg,var(--pink),var(--purple))!important}
#qos-phone .qos-card{margin-bottom:12px;padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--card)}
#qos-phone .qos-card-title{display:flex;align-items:center;gap:6px;margin-bottom:13px;color:var(--pink);font-size:14px;font-weight:700}
#qos-phone .qos-home-hero{text-align:center;padding:32px 0 26px}
#qos-phone .qos-spade{height:105px;color:var(--pink);font-size:108px;font-weight:900;line-height:1;text-shadow:0 0 35px rgba(189,0,255,.5)}
#qos-phone .qos-spade:before{content:"♠"}
#qos-phone .qos-home-q{margin-top:-14px;margin-bottom:18px;color:rgba(255,255,255,.12);font-size:46px;font-weight:900;letter-spacing:8px}
#qos-phone .qos-welcome{margin-bottom:5px;color:#fff;font-size:18px;font-weight:700;letter-spacing:1px}
#qos-phone .qos-sub{color:#888;font-size:12px}
#qos-phone .qos-divider{width:60px;height:2px;margin:17px auto 0;background:linear-gradient(90deg,transparent,var(--pink),transparent)}
#qos-phone .qos-activity{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
#qos-phone .qos-activity:last-child{border-bottom:0}
#qos-phone .qos-activity-icon{width:30px;height:30px;flex:0 0 30px;display:grid;place-items:center;border-radius:50%;background:rgba(255,105,180,.15)}
#qos-phone .qos-activity-text{flex:1;min-width:0;color:#ccc}
#qos-phone .qos-activity-time{color:#555;font-size:10px;white-space:nowrap}
#qos-phone .qos-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
#qos-phone .qos-header h2{margin:0;color:var(--pink);font-size:16px}
#qos-phone .qos-actions{display:flex;gap:6px}
#qos-phone .qos-small-btn{padding:6px 10px;border:1px solid rgba(255,105,180,.3);border-radius:8px;background:rgba(255,105,180,.1);color:var(--pink);font-size:11px;cursor:pointer}
#qos-phone .qos-small-btn:hover{background:rgba(255,105,180,.2)}
#qos-phone .qos-category-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:12px}
#qos-phone .qos-category{overflow:hidden;padding:7px 4px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.03);color:#888;font-size:10px;text-align:center;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
#qos-phone .qos-category.active{border-color:rgba(255,105,180,.4);background:rgba(255,105,180,.13);color:var(--pink)}
#qos-phone .qos-post-list{display:grid;gap:8px}
#qos-phone .qos-post{padding:12px;border:1px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.035);cursor:pointer}
#qos-phone .qos-post.open{border-color:rgba(255,105,180,.35);background:rgba(255,255,255,.055)}
#qos-phone .qos-post-top{display:flex;align-items:flex-start;gap:8px}
#qos-phone .qos-avatar{width:34px;height:34px;flex:0 0 34px;display:grid;place-items:center;border-radius:50%;font-size:15px}
#qos-phone .pink{background:linear-gradient(135deg,#ff69b4,#ff1493)}
#qos-phone .purple{background:linear-gradient(135deg,#bd00ff,#7b00ff)}
#qos-phone .blue{background:linear-gradient(135deg,#00bfff,#0066ff)}
#qos-phone .green{background:linear-gradient(135deg,#00dd88,#008844)}
#qos-phone .orange{background:linear-gradient(135deg,#ff9900,#ff4400)}
#qos-phone .gray{background:linear-gradient(135deg,#333,#777)}
#qos-phone .post-info{flex:1;min-width:0}
#qos-phone .post-title{overflow:hidden;margin-bottom:3px;color:#fff;font-size:13px;font-weight:600;text-overflow:ellipsis;white-space:nowrap}
#qos-phone .post-meta{display:flex;flex-wrap:wrap;gap:5px;color:#666;font-size:10px}
#qos-phone .post-tag{padding:1px 5px;border:1px solid rgba(255,105,180,.25);border-radius:4px;color:var(--pink);font-size:9px}
#qos-phone .post-stats{display:flex;flex:0 0 auto;gap:5px;color:#666;font-size:9px}
#qos-phone .post-body{display:none;padding-top:10px;margin-top:9px;border-top:1px solid rgba(255,255,255,.06)}
#qos-phone .qos-post.open .post-body{display:block}
#qos-phone .post-content{margin-bottom:10px;color:#ccc;font-size:12px;line-height:1.7;white-space:pre-wrap}
#qos-phone .reply{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
#qos-phone .reply:last-child{border-bottom:0}
#qos-phone .reply-avatar{width:24px;height:24px;flex:0 0 24px;display:grid;place-items:center;border-radius:50%;font-size:11px}
#qos-phone .reply-main{flex:1;min-width:0}
#qos-phone .reply-author{color:var(--pink);font-size:11px;font-weight:600}
#qos-phone .reply-text{color:#aaa;font-size:11px;line-height:1.5}
#qos-phone .reply-time{display:block;margin-top:3px;color:#555;font-size:9px}
#qos-phone .qos-tabs{display:flex;gap:6px;margin-bottom:12px}
#qos-phone .qos-tab{flex:1;padding:8px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.03);color:#888;font-size:11px;text-align:center;cursor:pointer}
#qos-phone .qos-tab.active{border-color:rgba(255,105,180,.35);background:rgba(255,105,180,.12);color:var(--pink)}
#qos-phone .qos-contact{display:flex;align-items:center;gap:10px;padding:12px;margin-bottom:8px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.025);cursor:pointer}
#qos-phone .contact-avatar{width:44px;height:44px;flex:0 0 44px;display:grid;place-items:center;border-radius:50%;font-size:19px}
#qos-phone .contact-info{flex:1;min-width:0}
#qos-phone .contact-name{margin-bottom:3px;color:#fff;font-size:14px;font-weight:600}
#qos-phone .contact-preview{overflow:hidden;color:#666;font-size:11px;text-overflow:ellipsis;white-space:nowrap}
#qos-phone .contact-time{color:#555;font-size:10px;white-space:nowrap}
#qos-phone .qos-chat{display:flex;flex-direction:column;width:100%;height:100%;min-height:0}
#qos-phone .chat-head{display:flex;align-items:center;gap:9px;padding-bottom:10px;margin-bottom:8px;border-bottom:1px solid var(--line)}
#qos-phone .back-btn{padding:4px;border:0;background:transparent;color:#aaa;font-size:18px;cursor:pointer}
#qos-phone .chat-name{color:#fff;font-size:15px;font-weight:600}
#qos-phone .chat-status{margin-left:auto;color:#666;font-size:10px}
#qos-phone .chat-messages{display:flex;flex:1;flex-direction:column;gap:8px;min-height:0;overflow-y:auto;padding:4px 0 10px}
#qos-phone .bubble{max-width:82%;padding:9px 12px;border-radius:16px;color:#ddd;font-size:12px;line-height:1.6;white-space:pre-wrap}
#qos-phone .bubble.sent{align-self:flex-end;border-bottom-right-radius:4px;background:linear-gradient(135deg,#ff69b4,#bd00ff);color:#fff}
#qos-phone .bubble.received{align-self:flex-start;border-bottom-left-radius:4px;background:rgba(255,255,255,.07)}
#qos-phone .bubble-time{display:block;margin-top:3px;color:rgba(255,255,255,.5);font-size:9px;text-align:right}
#qos-phone .chat-input-row{display:flex;align-items:flex-end;gap:7px}
#qos-phone .chat-input{flex:1;min-height:40px;max-height:100px;padding:10px 13px;border:1px solid var(--line);border-radius:20px;outline:0;background:rgba(255,255,255,.06);color:#ddd;font-size:13px;resize:none}
#qos-phone .send-btn{width:40px;height:40px;flex:0 0 40px;border:0;border-radius:50%;background:linear-gradient(135deg,#ff69b4,#bd00ff);color:#fff;font-size:17px;cursor:pointer}
#qos-phone .notice{padding:12px;margin-bottom:8px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.025)}
#qos-phone .notice-title{margin-bottom:4px;color:var(--pink);font-size:12px;font-weight:600}
#qos-phone .notice-text{color:#999;font-size:11px;line-height:1.5}
#qos-phone .notice-time{margin-top:6px;color:#555;font-size:9px}
#qos-phone .rank-card{margin-bottom:10px;padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.035)}
#qos-phone .rank-head{display:flex;justify-content:space-between;margin-bottom:10px;color:var(--pink);font-size:14px;font-weight:700}
#qos-phone .rank-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
#qos-phone .rank-row:last-child{border-bottom:0}
#qos-phone .rank-num{width:22px;color:#777;font-weight:700;text-align:center}
#qos-phone .rank-name{flex:1;min-width:0;color:#ddd;font-size:12px}
#qos-phone .rank-heat{color:var(--pink);font-size:12px;font-weight:700}
#qos-phone .profile-head{text-align:center;padding:22px 0}
#qos-phone .profile-avatar{width:92px;height:92px;margin:0 auto 10px;display:grid;place-items:center;border-radius:50%;background:linear-gradient(135deg,#ff69b4,#bd00ff);font-size:42px}
#qos-phone .profile-name{color:#fff;font-size:20px;font-weight:700}
#qos-phone .profile-meta{margin:4px 0 8px;color:#888;font-size:13px}
#qos-phone .status{display:inline-block;padding:4px 12px;border:1px solid rgba(255,105,180,.3);border-radius:20px;background:rgba(255,105,180,.12);color:var(--pink);font-size:12px}
#qos-phone .meter-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
#qos-phone .meter-label span:first-child{color:#aaa}
#qos-phone .meter-label span:last-child{color:#fff}
#qos-phone .meter-track{height:8px;overflow:hidden;border-radius:10px;background:rgba(255,255,255,.08)}
#qos-phone .meter-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#ff69b4,#bd00ff)}
#qos-phone .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
#qos-phone .stat{padding:12px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.03);text-align:center}
#qos-phone .stat-value{color:#fff;font-size:20px;font-weight:700}
#qos-phone .stat-label{margin-top:3px;color:#666;font-size:10px}
#qos-phone .detail{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
#qos-phone .detail-label{margin-bottom:3px;color:#666;font-size:10px}
#qos-phone .detail-value{color:#ccc}
#qos-phone .tags{display:flex;flex-wrap:wrap;gap:7px}
#qos-phone .tag{padding:6px 12px;border:1px solid rgba(255,105,180,.3);border-radius:20px;background:rgba(255,105,180,.12);color:var(--pink);font-size:11px}
#qos-phone .tag.locked{border-color:var(--line);background:rgba(255,255,255,.03);color:#555}
#qos-phone .diary-btn{display:flex;justify-content:space-between;width:100%;padding:13px;border:1px solid rgba(255,105,180,.3);border-radius:11px;background:rgba(255,105,180,.1);color:var(--pink);font-size:13px;cursor:pointer}
#qos-phone .qos-overlay{position:absolute;inset:0;z-index:100;display:none;place-items:center;padding:18px;background:rgba(0,0,0,.78)}
#qos-phone .qos-overlay.show{display:grid}
#qos-phone .modal{width:100%;max-height:85%;padding:18px;overflow-y:auto;border:1px solid rgba(255,105,180,.35);border-radius:15px;background:#1a1a1a}
#qos-phone .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;color:var(--pink);font-size:16px;font-weight:700}
#qos-phone .close-btn{border:0;background:transparent;color:#888;font-size:22px;cursor:pointer}
#qos-phone .form-row{margin-bottom:11px}
#qos-phone .form-row label{display:block;margin-bottom:4px;color:#888;font-size:11px}
#qos-phone .form-row input,#qos-phone .form-row select,#qos-phone .form-row textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;outline:0;background:rgba(255,255,255,.06);color:#ddd;font-size:13px}
#qos-phone .form-row textarea{min-height:100px;resize:vertical}
#qos-phone .submit-btn{width:100%;padding:11px;border:0;border-radius:9px;background:linear-gradient(135deg,#ff69b4,#bd00ff);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
#qos-phone .empty{text-align:center;padding:40px 0;color:#555;font-size:13px}
</style>
</head>
<body>
<div id="qos-phone">
<div class="qos-content" id="qos-content"></div>
<div class="qos-bottom-nav">
<button type="button" class="qos-nav-btn" data-tab="forum"><span class="qos-nav-icon">▣</span><span class="qos-nav-label">论坛</span></button>
<button type="button" class="qos-nav-btn" data-tab="messages"><span class="qos-nav-icon">✉</span><span class="qos-nav-label">消息</span></button>
<button type="button" class="qos-nav-btn qos-home-btn active" data-tab="home">Q</button>
<button type="button" class="qos-nav-btn" data-tab="ranking"><span class="qos-nav-icon">♛</span><span class="qos-nav-label">排行</span></button>
<button type="button" class="qos-nav-btn" data-tab="profile"><span class="qos-nav-icon">☺</span><span class="qos-nav-label">我的</span></button>
</div>
<div class="qos-overlay" id="diary-overlay">
<div class="modal">
<div class="modal-head"><span>秘密日记</span><button type="button" class="close-btn" data-action="close-diary">×</button></div>
<div id="diary-content"></div>
</div>
</div>
<div class="qos-overlay" id="post-overlay">
<div class="modal">
<div class="modal-head"><span>发布新帖</span><button type="button" class="close-btn" data-action="close-post">×</button></div>
<div class="form-row"><label>分类</label><select id="post-category"><option value="0">日常吹水</option><option value="1">剧情讨论</option><option value="2">技术交流</option><option value="3">内容分享</option><option value="4">影音鉴赏</option><option value="5">求助问答</option></select></div>
<div class="form-row"><label>标题</label><input id="post-title" maxlength="50" placeholder="请输入标题"></div>
<div class="form-row"><label>内容</label><textarea id="post-content" maxlength="1000" placeholder="请输入内容"></textarea></div>
<button type="button" class="submit-btn" data-action="submit-post">发布</button>
</div>
</div>
</div>
<script>

var currentTab="home";

var posts=[
{id:"p1",cat:0,title:"【日常】今天天气真好，大家有什么安排吗？",body:"阳光明媚，适合出去走走，但我还是选择在家打游戏，哈哈。",author:"电竞少女-小樱",avatar:"blue",time:"3分钟前",likes:34,replies:["今天准备继续探索 QOS 世界。","这个天气确实很适合出门。"]},

];
var contacts=[{id:"wife",name:"老婆-小雅",avatar:"blue",icon:"○"},{id:"chris",name:"克里斯",avatar:"gray",icon:"◆"},{id:"yumi",name:"由美",avatar:"pink",icon:"◉"}];
var chats={wife:[{from:"wife",text:"亲爱的，你看到我新下载的那个 App 了吗？",time:"20:15"},{from:"myself",text:"看到了，叫 QOS 是吧？感觉有点复杂。",time:"20:16"},{from:"wife",text:"我研究了一下，好像是个很有趣的游戏。",time:"20:18"}],chris:[{from:"chris",text:"嘿，今天练得怎么样？",time:"20:30"},{from:"myself",text:"最近工作有点累，状态不太好。",time:"20:32"}],yumi:[{from:"yumi",text:"主人，由美检测到您的状态有轻微波动。",time:"21:00"},{from:"myself",text:"没什么大事，只是有点累。",time:"21:02"}]};
function esc(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function now(){var d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
function fillInput(text){try{var w=window.top||window.parent||window;var t=w.document.querySelector("#send_textarea")||w.document.querySelector("textarea");if(!t)return;var s=Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,"value");if(s&&s.set)s.set.call(t,text);else t.value=text;t.dispatchEvent(new Event("input",{bubbles:true}));t.dispatchEvent(new Event("change",{bubbles:true}))}catch(e){}}
function loadData(){try{var m=window.parent&&window.parent.Mvu;if(m&&typeof m.getCurrentMvuData==="function"){var d=m.getCurrentMvuData();var x=d&&d.stat_data&&d.stat_data.小雅;if(x){if(x.堕落值!=null)profile.corruption=Number(x.堕落值)||0;if(x.等级!=null)profile.level=Math.max(0,Math.min(5,parseInt(x.等级,10)||0));if(x.上衣)profile.outfit[1]=x.上衣;if(Array.isArray(x.性癖))profile.kinks=x.性癖}}}catch(e){}try{var h=window.TavernHelper||window;if(typeof h.getVariables==="function"){var v=h.getVariables({type:"chat"});var p=v&&v.qos_app&&v.qos_app.wifeProfile;if(p)for(var k in p)profile[k]=p[k]}}catch(e){}}
function setTab(tab){currentTab=tab;chatTarget=null;document.querySelectorAll("#qos-phone .qos-nav-btn").forEach(function(b){b.classList.toggle("active",b.dataset.tab===tab)});render()}
function render(){if(currentTab==="forum")renderForum();else if(currentTab==="messages")renderMessages();else if(currentTab==="ranking")renderRanking();else if(currentTab==="profile")renderProfile();else renderHome()}
function renderHome(){content.innerHTML='<div class="qos-home-hero"><div class="qos-spade"></div><div class="qos-home-q">Q</div><div class="qos-welcome">欢迎来到 QOS 的世界</div><div class="qos-sub">Queen of Spades</div><div class="qos-divider"></div></div><div class="qos-card"><div class="qos-card-title">最新动态</div><div class="qos-activity"><div class="qos-activity-icon">✉</div><div class="qos-activity-text">你收到了 <strong>老婆-小雅</strong> 的新消息</div><div class="qos-activity-time">刚刚</div></div><div class="qos-activity"><div class="qos-activity-icon">◉</div><div class="qos-activity-text">你收到了 <strong>由美</strong> 的状态提醒</div><div class="qos-activity-time">刚刚</div></div><div class="qos-activity"><div class="qos-activity-icon">▣</div><div class="qos-activity-text"><strong>瑜伽导师-瑞贝卡</strong> 发布了新帖子</div><div class="qos-activity-time">刚刚</div></div><div class="qos-activity"><div class="qos-activity-icon">♛</div><div class="qos-activity-text"><strong>由美</strong> 登上了女王榜第 1</div><div class="qos-activity-time">2分钟前</div></div></div></div>'}
function renderForum(){var list=selectedCategory<0?posts:posts.filter(function(p){return p.cat===selectedCategory});var h='<div class="qos-header"><h2>QOS 论坛</h2><div class="qos-actions"><button class="qos-small-btn" data-action="open-post">发新帖</button><button class="qos-small-btn" data-action="refresh">刷新</button></div></div><div class="qos-category-list"><span class="qos-category '+(selectedCategory<0?"active":"")+'" data-action="filter" data-cat="-1">全部</span>';categories.forEach(function(c,i){h+='<span class="qos-category '+(selectedCategory===i?"active":"")+'" data-action="filter" data-cat="'+i+'">'+esc(c)+'</span>'});h+='</div><div class="qos-post-list">';if(!list.length)h+='<div class="empty">暂无帖子</div>';list.forEach(function(p){var open=openPostId===p.id;h+='<div class="qos-post '+(open?"open":"")+'" data-post="'+esc(p.id)+'"><div class="qos-post-top"><div class="qos-avatar '+esc(p.avatar)+'">'+esc(p.author.slice(0,1))+'</div><div class="post-info"><div class="post-title">'+esc(p.title)+'</div><div class="post-meta"><span class="post-tag">'+esc(categories[p.cat])+'</span><span>'+esc(p.author)+'</span><span>'+esc(p.time)+'</span></div></div><div class="post-stats"><span>赞 '+p.likes+'</span><span>回 '+p.replies.length+'</span></div></div><div class="post-body"><div class="post-content">'+esc(p.body)+'</div>';p.replies.forEach(function(r){h+='<div class="reply"><div class="reply-avatar pink">◉</div><div class="reply-main"><div class="reply-author">匿名用户</div><div class="reply-text">'+esc(r)+'<span class="reply-time">刚刚</span></div></div></div>'});h+='</div></div>'});h+='</div>';content.innerHTML=h}
function renderMessages(){if(chatTarget){renderChat();return}var h='<div class="qos-header"><h2>消息</h2></div><div class="qos-tabs"><span class="qos-tab '+(messageTab==="chat"?"active":"")+'" data-action="msg-tab" data-tabname="chat">聊天</span><span class="qos-tab '+(messageTab==="notice"?"active":"")+'" data-action="msg-tab" data-tabname="notice">通知</span></div>';if(messageTab==="notice"){h+='<div class="notice"><div class="notice-title">系统通知</div><div class="notice-text">欢迎使用 QOS App！</div><div class="notice-time">2045/09/12</div></div><div class="notice"><div class="notice-title">版本更新</div><div class="notice-text">v1.1 版本已发布。</div><div class="notice-time">2045/09/11</div></div>'}else{contacts.forEach(function(c){var arr=chats[c.id]||[];var last=arr[arr.length-1];h+='<div class="qos-contact" data-contact="'+c.id+'"><div class="contact-avatar '+c.avatar+'">'+c.icon+'</div><div class="contact-info"><div class="contact-name">'+esc(c.name)+'</div><div class="contact-preview">'+esc(last?last.text:"暂无消息")+'</div></div><div class="contact-time">'+esc(last?last.time:"")+'</div></div>'})}content.innerHTML=h}
function renderChat(){var c=contacts.find(function(x){return x.id===chatTarget});var arr=chats[chatTarget]||[];var h='<div class="qos-chat"><div class="chat-head"><button class="back-btn" data-action="back-chat">←</button><div class="contact-avatar '+c.avatar+'" style="width:32px;height:32px;font-size:14px">'+c.icon+'</div><div class="chat-name">'+esc(c.name)+'</div><div class="chat-status">在线</div></div><div class="chat-messages" id="chat-messages">';arr.forEach(function(m){h+='<div class="bubble '+(m.from==="myself"?"sent":"received")+'">'+esc(m.text)+'<span class="bubble-time">'+esc(m.time)+'</span></div>'});h+='</div><div class="chat-input-row"><textarea class="chat-input" id="chat-input" rows="1" placeholder="请输入消息"></textarea><button class="send-btn" data-action="send-chat">→</button></div></div>';content.innerHTML=h;setTimeout(function(){var x=document.getElementById("chat-messages");if(x)x.scrollTop=x.scrollHeight},20)}
function renderRanking(){var sorted=posts.slice().sort(function(a,b){return b.likes-a.likes});var h='<div class="rank-card"><div class="rank-head"><span>QOS 女王榜</span><span>🔥</span></div>';["由美","匿名用户_a7d3","紫水晶之梦","绿茶小仙女","粉红小恶魔"].forEach(function(n,i){h+='<div class="rank-row"><div class="rank-num">'+(i+1)+'</div><div class="qos-avatar '+["pink","orange","purple","green","pink"][i]+'" style="width:32px;height:32px;font-size:13px">'+n.slice(0,1)+'</div><div class="rank-name">'+esc(n)+'</div><div class="rank-heat">'+(98-i*6)+'</div></div>'});h+='</div><div class="rank-card"><div class="rank-head"><span>热门帖子 TOP5</span><span>🔥</span></div>';sorted.slice(0,5).forEach(function(p,i){h+='<div class="rank-row"><div class="rank-num">'+(i+1)+'</div><div class="rank-name">'+esc(p.title)+'</div><div class="rank-heat">'+p.likes+'</div></div>'});h+='</div>';content.innerHTML=h}
function renderProfile(){var lv=Math.max(0,Math.min(5,Number(profile.level)||0));var lock=lv>=3;var corruption=Math.max(0,Math.min(100,Number(profile.corruption)||0));var h='<div class="profile-head"><div class="profile-avatar">○</div><div class="profile-name">'+esc(profile.name)+'</div><div class="profile-meta">'+esc(profile.age)+'岁 | '+esc(profile.role)+'</div><span class="status">'+(lock?"状态：已锁定":"忠贞")+'</span></div><div class="qos-card"><div class="qos-card-title">QoS 等级</div><div style="text-align:center;padding:5px 0 12px;font-size:25px">◉ ◉ ◉</div><div style="text-align:center;color:#888;font-size:12px;margin-bottom:14px">'+esc(levelNames[lv])+'</div><div class="meter-label"><span>堕落值</span><span>'+corruption+'%</span></div><div class="meter-track"><div class="meter-fill" style="width:'+corruption+'%"></div></div><div class="detail"><span class="detail-label">当前伴侣：</span><span class="detail-value '+(lock?"locked":"")+'" data-action="'+(lock?"lock":"")+'" data-key="partner">'+(lock?(revealed.partner?"当前："+esc(profile.partner):"点击查看"):esc(profile.partner))+'</span></div><div class="detail"><span class="detail-label">相关次数：</span><span class="detail-value '+(lock?"locked":"")+'" data-action="'+(lock?"lock":"")+'" data-key="affair">'+(lock?(revealed.affair?"次数："+profile.affairCount+"次":"点击查看"):profile.affairCount+"次")+'</span></div></div><div class="qos-card"><div class="qos-card-title">身体数据</div><div class="stat-grid"><div class="stat"><div class="stat-value">'+["A","B","C","D","E","F"][lv]+'</div><div class="stat-label">罩杯</div></div><div class="stat"><div class="stat-value">'+profile.sexCount+'</div><div class="stat-label">相关次数</div></div></div><div class="detail"><div class="detail-label">当前穿着</div><div class="detail-value">'+esc(profile.outfit[1])+'</div></div>';profile.outfit.forEach(function(x,i){h+='<div class="detail"><span class="detail-label">'+["妆容","上装","下装","鞋袜","配饰"][i]+'：</span><span class="detail-value">'+esc(x)+'</span></div>'});h+='</div><div class="qos-card"><div class="qos-card-title">已解锁内容</div><div class="tags">';["接吻","口交","后入","露出","3P","BDSM","羞耻","催眠调教","QoS专属"].forEach(function(x,i){h+='<span class="tag '+(i<=lv+2?"":"locked")+'">'+(i<=lv+2?x:"?")+'</span>'});h+='</div></div><button class="diary-btn" data-action="open-diary"><span>查看她的秘密日记</span><span>→</span></button>';content.innerHTML=h}
function openPost(){document.getElementById("post-overlay").classList.add("show");document.getElementById("post-title").value="";document.getElementById("post-content").value=""}
function closePost(){document.getElementById("post-overlay").classList.remove("show")}
function submitPost(){var title=document.getElementById("post-title").value.trim();var body=document.getElementById("post-content").value.trim();var cat=Number(document.getElementById("post-category").value)||0;if(!title||!body){alert("标题和内容不能为空");return}posts.unshift({id:"user_"+Date.now(),cat:cat,title:title,body:body,author:profile.name,avatar:"pink",time:"刚刚",likes:0,replies:[]});closePost();setTab("forum");fillInput("你在论坛上发布了一个新帖子："+body)}
function openDiary(){var h="";profile.diary.forEach(function(x){h+='<div class="detail"><div class="detail-label">'+esc(x.date)+'</div><div class="detail-value">'+esc(x.text)+'</div></div>'});document.getElementById("diary-content").innerHTML=h||'<div class="empty">日记是空的</div>';document.getElementById("diary-overlay").classList.add("show")}
function closeDiary(){document.getElementById("diary-overlay").classList.remove("show")}
function sendChat(){var input=document.getElementById("chat-input");if(!input)return;var text=input.value.trim();if(!text)return;if(!chats[chatTarget])chats[chatTarget]=[];chats[chatTarget].push({from:"myself",text:text,time:now()});var c=contacts.find(function(x){return x.id===chatTarget});fillInput("你给"+c.name+"发送了消息："+text);renderChat()}
root.addEventListener("click",function(e){var nav=e.target.closest(".qos-nav-btn");if(nav){setTab(nav.dataset.tab);return}var action=e.target.closest("[data-action]");if(action){var a=action.dataset.action;if(a==="open-post")openPost();else if(a==="close-post")closePost();else if(a==="submit-post")submitPost();else if(a==="open-diary")openDiary();else if(a==="close-diary")closeDiary();else if(a==="refresh"){posts.unshift({id:"r_"+Date.now(),cat:Math.floor(Math.random()*6),title:"【新帖】论坛刷新后看到的新内容",body:"这里是刚刚刷新的论坛内容，欢迎大家一起讨论。",author:"匿名用户",avatar:"pink",time:"刚刚",likes:12,replies:["感谢分享。"]});render()}else if(a==="filter"){selectedCategory=Number(action.dataset.cat);openPostId=null;render()}else if(a==="msg-tab"){messageTab=action.dataset.tabname;chatTarget=null;render()}else if(a==="back-chat"){chatTarget=null;render()}else if(a==="send-chat")sendChat();else if(a==="lock"){var key=action.dataset.key;revealed[key]=!revealed[key];render()}return}var post=e.target.closest(".qos-post");if(post){openPostId=openPostId===post.dataset.post?null:post.dataset.post;render();return}var contact=e.target.closest(".qos-contact");if(contact){chatTarget=contact.dataset.contact;render();return}if(e.target===document.getElementById("post-overlay"))closePost();if(e.target===document.getElementById("diary-overlay"))closeDiary()});
root.addEventListener("keydown",function(e){if(e.target.id==="chat-input"&&e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat()}});
loadData();
render();
})();
</script>
